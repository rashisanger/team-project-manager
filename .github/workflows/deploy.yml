name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # STEP 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # STEP 2 — Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 3 — Build backend image
      - name: Build Backend Image
        run: |
          docker build -t rashi1/pm-backend:latest ./backend

      # STEP 4 — Build frontend image
      - name: Build Frontend Image
        run: |
          docker build -t rashi1/pm-frontend:latest ./frontend

      # STEP 5 — Push backend image
      - name: Push Backend Image
        run: |
          docker push rashi1/pm-backend:latest

      # STEP 6 — Push frontend image
      - name: Push Frontend Image
        run: |
          docker push rashi1/pm-frontend:latest

      # STEP 7 — Deploy backend to Render
      - name: Deploy Backend to Render
        run: |
          curl "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}

      # STEP 8 — Deploy frontend to Vercel
      - name: Deploy Frontend to Vercel
        run: |
          npm install -g vercel
          cd frontend
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
